<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Alexander Black | Portfolio</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&amp;family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;display=swap" rel="stylesheet"/>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'matte-black': '#0B0B0B',
                        'gold-primary': '#FFD700',
                        'gold-dark': '#C9A227',
                        'gold-light': '#FFF3B0',
                    },
                    fontFamily: {
                        'playfair': ['"Playfair Display"', 'serif'],
                        'montserrat': ['Montserrat', 'sans-serif'],
                    },
                    backgroundImage: {
                        'gold-gradient': 'linear-gradient(to right, #FFD700, #C9A227, #FFF3B0)',
                        'gold-gradient-hover': 'linear-gradient(to right, #FFF3B0, #FFD700, #C9A227)',
                    }
                }
            }
        }
    </script>
    <style data-purpose="custom-animations">
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-reveal {
            animation: fadeIn 1s ease-out forwards;
        }
        .glass-nav {
            background: rgba(11, 11, 11, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }
        .gold-text-gradient {
            background: linear-gradient(to right, #FFD700, #C9A227, #FFF3B0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .gold-border {
            border: 1px solid #C9A227;
        }
        .gold-border-focus:focus {
            border-color: #FFD700;
            --tw-ring-color: #FFD700;
        }
    </style>
</head>
<body class="bg-matte-black text-white font-montserrat antialiased">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
</body>
</html>
